name: Lint & Static Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Android lint and detekt
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Stop Gradle daemons
        run: ./gradlew --stop || true

      - name: Run detekt
        run: |
          ./gradlew detekt \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache \
            --rerun-tasks

      - name: Run Android lint
        run: |
          ./gradlew :leisure:lintDebug \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache \
            --rerun-tasks

      - name: Upload lint reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            **/build/reports/**
            **/build/outputs/**
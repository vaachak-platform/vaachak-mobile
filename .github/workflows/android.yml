name: Android CI & Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # Automatically caches Gradle dependencies

      # Caching for the native SQLite binaries required by your :core tests
      - name: Cache SQLite4Java
        uses: actions/cache@v4
        with:
          path: ~/.sqlite4java
          key: ${{ runner.os }}-sqlite4java-${{ hashFiles('**/*.gradle*') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Integrated from lint.yml: Runs static analysis first to fail fast on code style
      - name: Run Detekt (Static Analysis)
        run: ./gradlew detekt --build-cache --parallel --continue

      # Runs your refactored BaseDaoTest-driven unit tests
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --build-cache --parallel

      # Final build to ensure the project assembles correctly
      - name: Build Debug APK
        run: ./gradlew assembleDebug --build-cache --parallel

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vaachak-Debug-APK
          path: leisure/build/outputs/apk/debug/*.apk
          retention-days: 7
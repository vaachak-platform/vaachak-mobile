name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, test, and static analysis
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Stop Gradle daemons
        run: ./gradlew --stop || true

      - name: Clean
        run: |
          ./gradlew clean \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-configuration-cache

      - name: Build shared metadata
        run: |
          ./gradlew :core:compileCommonMainKotlinMetadata \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache \
            --rerun-tasks

      - name: Run static analysis
        run: |
          ./gradlew detekt \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache \
            --rerun-tasks

      - name: Run unit tests
        run: |
          ./gradlew \
          :core:testDebugUnitTest \
          :leisure:testDebugUnitTest \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache \
            --rerun-tasks

      - name: Assemble debug APK
        run: |
          ./gradlew :leisure:assembleDebug \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache \
            --rerun-tasks

      - name: Upload test and build reports on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-ci-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
            **/build/outputs/**
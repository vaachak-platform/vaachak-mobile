name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Detekt (Static Analysis)
        run: ./gradlew detekt --build-cache --parallel --continue

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --build-cache --parallel

      - name: Build Debug APK
        run: ./gradlew assembleDebug --build-cache --parallel

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vaachak-Debug-APK
          path: leisure/build/outputs/apk/debug/*.apk
          retention-days: 7
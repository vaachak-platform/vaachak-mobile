name: Android CI & Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache SQLite4Java
        uses: actions/cache@v4
        with:
          path: ~/.sqlite4java
          key: ${{ runner.os }}-sqlite4java-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-sqlite4java-

      - name: Clean
        run: ./gradlew clean --no-configuration-cache

      - name: Verify shared KMP metadata
        run: |
          ./gradlew :core:compileCommonMainKotlinMetadata \
            --stacktrace \
            --no-build-cache \
            --no-configuration-cache

      - name: Run Detekt
        run: ./gradlew detekt --stacktrace --build-cache --parallel --continue

      - name: Run Android unit tests
        run: |
          ./gradlew :leisure:testDebugUnitTest \
            --stacktrace \
            --build-cache \
            --parallel

      - name: Build debug APK
        run: |
          ./gradlew :leisure:assembleDebug \
            --stacktrace \
            --build-cache \
            --parallel

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Vaachak-Debug-APK
          path: leisure/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
            **/build/tmp/**
            **/build/kotlin/**
            **/build/outputs/**
            **/detekt.*
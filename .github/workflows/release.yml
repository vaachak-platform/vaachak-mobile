name: Build & Release APK

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Stop Gradle daemons
        run: ./gradlew --stop || true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > leisure/vaachak-key.jks

      - name: Build release APK
        env:
          ORG_GRADLE_PROJECT_VAACHAK_KEYSTORE_PASSWORD: ${{ secrets.VAACHAK_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_VAACHAK_KEY_ALIAS: ${{ secrets.VAACHAK_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_VAACHAK_KEY_PASSWORD: ${{ secrets.VAACHAK_KEY_PASSWORD }}
        run: |
          ./gradlew :leisure:assembleRelease \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache \
            --rerun-tasks

      - name: Verify release APK exists
        run: |
          ls -lah leisure/build/outputs/apk/release/
          test -n "$(find leisure/build/outputs/apk/release -maxdepth 1 -name '*.apk' -print -quit)"

      - name: Generate APK checksums
        run: |
          cd leisure/build/outputs/apk/release
          sha256sum *.apk > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: |
            leisure/build/outputs/apk/release/*.apk
            leisure/build/outputs/apk/release/SHA256SUMS.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-build-reports
          path: |
            **/build/reports/**
            **/build/tmp/**
            **/build/outputs/apk/release/*.apk

      - name: Cleanup keystore
        if: always()
        run: rm -f leisure/vaachak-key.jks
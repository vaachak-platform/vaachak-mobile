name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Release APK
        # This triggers the 'release' buildType you defined in build.gradle.kts
        run: ./gradlew :leisure:assembleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # Targets the naming convention you set in build.gradle.kts: LeisureVaachak-Release.apk
          files: leisure/build/outputs/apk/release/LeisureVaachak-Release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
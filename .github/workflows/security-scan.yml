name: OWASP MobSF Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobsfscan:
    name: Source security scan
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run MobSFScan
        uses: MobSF/mobsfscan@main
        with:
          args: ". --sarif --output mobsfscan-results.sarif --type android || true"

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: mobsfscan-results.sarif
          category: mobsfscan-android

      - name: Upload MobSFScan report artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobsfscan-results
          path: mobsfscan-results.sarif
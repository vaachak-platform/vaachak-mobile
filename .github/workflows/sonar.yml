name: SonarCloud Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Stop Gradle daemons
        run: ./gradlew --stop || true

      - name: Build reports needed by Sonar
        run: |
          ./gradlew clean \
            :core:compileCommonMainKotlinMetadata \
            detekt \
            :core:lintDebug \
            :core:testDebugUnitTest \
            :core:jacocoDebugUnitTestReport \
            :leisure:lintDebug \
            :leisure:testDebugUnitTest \
            :leisure:jacocoDebugUnitTestReport \
            :leisure:assembleDebug \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache \
            --rerun-tasks

      - name: Verify reports exist
        run: |
          echo "== Core lint =="
          ls -lah "$GITHUB_WORKSPACE/core/build/reports/" || true

          echo "== Leisure lint =="
          ls -lah "$GITHUB_WORKSPACE/leisure/build/reports/" || true

          echo "== Core JaCoCo =="
          ls -lah "$GITHUB_WORKSPACE/core/build/reports/jacoco/jacocoDebugUnitTestReport/" || true

          echo "== Leisure JaCoCo =="
          ls -lah "$GITHUB_WORKSPACE/leisure/build/reports/jacoco/jacocoDebugUnitTestReport/" || true

      - name: Run SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew sonar \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300 \
            -Dsonar.coverage.jacoco.xmlReportPaths="$GITHUB_WORKSPACE/core/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml,$GITHUB_WORKSPACE/leisure/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml" \
            -Dsonar.androidLint.reportPaths="$GITHUB_WORKSPACE/core/build/reports/lint-results-debug.xml,$GITHUB_WORKSPACE/leisure/build/reports/lint-results-debug.xml" \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache

      - name: Upload sonar-related reports on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sonar-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
            **/build/outputs/**
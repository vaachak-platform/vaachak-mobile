name: SonarCloud Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Stop Gradle daemons
        run: ./gradlew --stop || true

      - name: Build reports needed by Sonar
        run: |
          ./gradlew clean \
            :core:compileCommonMainKotlinMetadata \
            detekt \
            :core:testDebugUnitTest \
            :core:jacocoDebugUnitTestReport \
            :leisure:lintDebug \
            :leisure:testDebugUnitTest \
            :leisure:jacocoDebugUnitTestReport \
            :leisure:assembleDebug \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache \
            --rerun-tasks

      - name: Verify reports exist
        run: |
          echo "== JaCoCo XMLs =="
          ls -lah "$GITHUB_WORKSPACE/core/build/reports/jacoco/jacocoDebugUnitTestReport/" || true
          ls -lah "$GITHUB_WORKSPACE/leisure/build/reports/jacoco/jacocoDebugUnitTestReport/" || true

          echo "== Android Lint XML =="
          ls -lah "$GITHUB_WORKSPACE/leisure/build/reports/" || true

          echo "== Detekt XML candidates =="
          find "$GITHUB_WORKSPACE" -path "*/build/reports/detekt/*.xml" -print || true

      - name: Run SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew sonar \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300 \
            -Dsonar.coverage.jacoco.xmlReportPaths=$GITHUB_WORKSPACE/core/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml,$GITHUB_WORKSPACE/leisure/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            -Dsonar.androidLint.reportPaths=$GITHUB_WORKSPACE/leisure/build/reports/lint-results-debug.xml \
            --stacktrace \
            --console=plain \
            --warning-mode=summary \
            --no-problems-report \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache

      - name: Upload sonar-related reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
            **/build/outputs/**
version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      androidx:
        patterns: ["androidx.*"]
      ktor:
        patterns: ["io.ktor.*"]
      compose:
        patterns: ["org.jetbrains.compose.*"]
    labels:
      - "dependencies"
      - "automerge"
    # NEW: Instructs Dependabot to never open PRs for major version bumps
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"
      - "dependencies"
      - "automerge"
    # Optional but recommended: Also ignore major bumps for GitHub Actions
    # (e.g., checkout@v4 to checkout@v5) as they often require manual syntax updates.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
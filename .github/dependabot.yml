version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      androidx:
        patterns: ["androidx.*"]
      ktor:
        patterns: ["io.ktor.*"]
      compose:
        patterns: ["org.jetbrains.compose.*"]
    # Labels help the auto-merge workflow identify Dependabot PRs
    labels:
      - "dependencies"
      - "automerge"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"
      - "dependencies"
      - "automerge"